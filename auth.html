<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgriIntel K2 — Sign In</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-headline { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .fade-in { animation: fadeIn 0.4s ease-out both; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .bg-field {
      background-image: radial-gradient(circle at 20% 50%, rgba(18,59,42,0.08) 0%, transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(42,82,64,0.06) 0%, transparent 60%);
    }
  </style>
</head>
<body class="min-h-screen bg-[#f0f4f0] bg-field flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div id="auth-root"></div>
    <p class="text-center text-xs text-gray-400 mt-4">
      🌍 Supporting farmers in 50+ countries worldwide
    </p>
  </div>
  <script type="module" src="/src/auth.js"></script>
  <script type="module">
    import { initAuth } from '/src/auth.js';
    initAuth();
  </script>
</body>
</html>
